# 定时任务配置文件

# 任务列表
jobs:
  # 每日手机行业资讯推送
  - id: daily_news_task
    name: 手机行业资讯任务
    type: cron
    enabled: true  # 设为 false 禁用
    function: scheduler.jobs.job_def.add_timer_prompt
    cron:
      #分钟 小时 天 月 星期
      expression: "30 10 * * *"  # 每天早上10执行
    kwargs:
      timer_prompt: '{"conversation_type": 2, "conversation_id": "cidISzpQt3AXRimkEM/vYGDiA==", "text": "获取今天的手机行业资讯，仅（当天）资讯，不要有额外的问候内容 "}'

